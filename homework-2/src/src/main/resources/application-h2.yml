# H2 In-Memory Database Profile
# Use this profile when Docker/PostgreSQL is not available
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=h2

spring:
  datasource:
    url: jdbc:h2:mem:tickets;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false  # Use Hibernate auto-DDL for H2

logging:
  level:
    com.support.ticketsystem: DEBUG
    org.hibernate.SQL: DEBUG
